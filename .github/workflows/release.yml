name: Release

# Cut a release by pushing a tag like v1.0.0:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v1.0.0)"
        required: true

permissions:
  contents: write # create releases

jobs:
  release:
    runs-on: macos-15
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
      TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import Developer ID signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null

      - name: Build & sign (Developer ID, hardened runtime)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project ClipboardManager.xcodeproj \
            -scheme ClipboardManager \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            clean build
          echo "APP_PATH=build/Build/Products/Release/ClipboardManager.app" >> "$GITHUB_ENV"

      - name: Notarize & staple
        env:
          AC_API_KEY_BASE64: ${{ secrets.AC_API_KEY_BASE64 }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/ac_api_key.p8"
          echo "$AC_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          mkdir -p dist
          ZIP="dist/ClipboardManager.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --key "$KEY_PATH" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$APP_PATH"
          rm "$ZIP"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP"
          SHA="$(shasum -a 256 "$ZIP" | awk '{print $1}')"
          echo "ZIP_PATH=$ZIP" >> "$GITHUB_ENV"
          echo "SHA256=$SHA" >> "$GITHUB_ENV"
          {
            echo "### Release artifact"
            echo "- version: \`$VERSION\`"
            echo "- sha256: \`$SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: ${{ env.ZIP_PATH }}
          generate_release_notes: true

      # Optional: auto-bump the Homebrew cask. Runs only if TAP_GITHUB_TOKEN is set
      # (a PAT with write access to thkobierecki/homebrew-tap). Otherwise skipped,
      # and you update the cask manually with the sha256 from the job summary.
      - name: Update Homebrew tap
        if: env.TAP_TOKEN != ''
        run: |
          set -euo pipefail
          V="${VERSION#v}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/thkobierecki/homebrew-tap.git" tap
          CASK="tap/Casks/clipboard-manager.rb"
          /usr/bin/sed -i '' -E "s/version \".*\"/version \"$V\"/" "$CASK"
          /usr/bin/sed -i '' -E "s/sha256 \".*\"/sha256 \"$SHA256\"/" "$CASK"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "clipboard-manager $V"
          git push
